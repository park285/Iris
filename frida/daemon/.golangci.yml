version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - contextcheck
    - noctx
    - fatcontext
    - copyloopvar

    - canonicalheader
    - durationcheck
    - exptostd
    - intrange
    - modernize
    - recvcheck
    - unconvert
    - usestdlibvars

    - errname
    - errorlint
    - nilerr
    - nilnesserr
    - nilnil
    - wrapcheck

    - misspell
    - nakedret
    - nolintlint
    - predeclared
    - revive
    - wsl_v5
    - wastedassign

    - dupl
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - maintidx
    - nestif
    - prealloc

    - thelper
    - tparallel
    - usetesting

    - bidichk
    - depguard
    - gosec

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (*net/http.Response).Body.Close
        - (*os.File).Close

    govet:
      enable-all: true
      disable:
        - fieldalignment

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1020
        - -ST1021
        - -ST1022

    gocyclo:
      min-complexity: 17

    gocognit:
      min-complexity: 31

    dupl:
      threshold: 200

    goconst:
      min-len: 3
      min-occurrences: 5

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - exitAfterDefer
        - paramTypeCombine
        - unnamedResult
        - filepathJoin
        - hugeParam
        - emptyStringTest

    funlen:
      lines: 90
      statements: 45
      ignore-comments: true

    revive:
      severity: error
      enable-default-rules: true
      directives:
        - name: specify-disable-reason
          severity: error
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: use-any
        - name: use-errors-new
        - name: use-fmt-print
        - name: time-date
        - name: time-equal
        - name: error-naming
        - name: error-return
        - name: unexported-naming
        - name: unnecessary-format
        - name: unnecessary-if
        - name: unsecure-url-scheme
        - name: use-waitgroup-go

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    wsl_v5:
      default: all
      allow-first-in-block: false
      allow-whole-block: false
      branch-max-lines: 2
      case-max-lines: 0

    copyloopvar:
      check-alias: true

    fatcontext:
      check-struct-pointers: true

    nilnil:
      only-two: false
      detect-opposite: true

    predeclared:
      qualified-name: true

    wrapcheck:
      report-internal-errors: true

    maintidx:
      under: 35

    nestif:
      min-complexity: 4

    usetesting:
      os-temp-dir: true
      context-background: true

    depguard:
      rules:
        frida-binding-boundary:
          deny:
            - pkg: github.com/frida/frida-go/frida
              desc: raw frida-go binding access must stay in client_real.go
        exec-boundary:
          deny:
            - pkg: os/exec
              desc: process spawning is only allowed in adb

  exclusions:
    rules:
      - linters:
          - contextcheck
        text: 'Non-inherited new context'

      - linters:
          - gocyclo
          - errcheck
          - dupl
          - funlen
        path: _test\.go

      - linters:
          - gosec
        text: "G115:"

      - linters:
          - gosec
        text: "G117:"

      - linters:
          - gosec
        text: "G704:"

    paths:
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false

formatters:
  enable:
    - gci
    - gofmt
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/park285/Iris/frida/daemon)
      custom-order: true

    goimports:
      local-prefixes:
        - github.com/park285/Iris/frida/daemon
