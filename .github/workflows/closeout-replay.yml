name: closeout-replay

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/closeout-replay.yml"
      - "app/**"
      - "bridge/**"
      - "imagebridge-protocol/**"
      - "tools/**"
      - "scripts/**"
      - "docs/**"
      - "tests/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/closeout-replay.yml"
      - "app/**"
      - "bridge/**"
      - "imagebridge-protocol/**"
      - "tools/**"
      - "scripts/**"
      - "docs/**"
      - "tests/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2

      - uses: android-actions/setup-android@v3

      - name: Install Cargo Tooling
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Write local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Full Verify
        run: ./scripts/verify-all.sh

      - name: Export Closeout Packet
        run: ./scripts/export-closeout-packet.sh .tasklists/closeout-packet-${{ github.run_id }}

      - name: Replay Exported Packet
        run: |
          packet_dir=".tasklists/closeout-packet-${{ github.run_id }}"
          python3 scripts/verify_closeout_packet.py "$packet_dir"
          bash "$packet_dir/scripts/replay_closeout.sh"
